name: Test GitHub App Access

on: workflow_dispatch

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test-access:
    runs-on: ubuntu-latest

    steps:
      # Mints a short-lived installation token (≤1 h) scoped to the listed
      # repos. Requires LANDSCAPE_PACKAGER_APP_ID (var) and
      # LANDSCAPE_PACKAGER_PRIVATE_KEY (secret) to be set on this repo.
      - name: Generate App Token
        id: get_token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ vars.LANDSCAPE_PACKAGER_APP_ID }}
          private-key: ${{ secrets.LANDSCAPE_PACKAGER_PRIVATE_KEY }}
          owner: canonical
          repositories: "landscape-packaging,landscape-go,landscape-server,landscape-ui"

      # Checks out the top-level tree only (submodules: false).
      # actions/checkout only injects HTTPS credentials; the submodules in
      # landscape-packaging use SSH URLs, so the credential would be silently
      # ignored. We also use persist-credentials: false to avoid a stale
      # credential interfering with the url.insteadOf rule below.
      - name: Checkout landscape-packaging (top-level only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: canonical/landscape-packaging
          token: ${{ steps.get_token.outputs.token }}
          submodules: false
          persist-credentials: false
          path: landscape-packaging

      # Must run AFTER checkout (which resets git config) and BEFORE submodule
      # init. Token via env: to avoid interpolating it into the command string.
      # Rewrites git@github.com: → https://x-access-token:<token>@github.com/
      # globally so every recursive submodule fetch uses HTTPS + App token.
      - name: Rewrite SSH submodule URLs to authenticated HTTPS
        env:
          TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          git config --global \
            url."https://x-access-token:${TOKEN}@github.com/".insteadOf \
            "git@github.com:"

      - name: Initialise submodules recursively
        working-directory: landscape-packaging
        run: git submodule update --init --recursive
