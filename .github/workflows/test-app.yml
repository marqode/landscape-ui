name: Test GitHub App Access
on: workflow_dispatch # Allows you to run this manually

jobs:
  test-access:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          # Replace these with the actual names of your Secret and Variable
          app-id: ${{ vars.LANDSCAPE_PACKAGER_APP_ID }}
          private-key: ${{ secrets.LANDSCAPE_PACKAGER_PRIVATE_KEY }}
          owner: canonical
          repositories: "landscape-packaging, landscape-go, landscape-server, landscape-ui"

      - name: Force Git to use HTTPS for Submodules
        run: |
          # This rewrite must happen before the checkout step
          git config --global url."https://x-access-token:${{ steps.get_token.outputs.token }}@github.com/".insteadOf "git@github.com:"

          # Diagnostic: Check if the token is actually there (it will mask the secret, but should show '***')
          echo "Token length check: ${#TOKEN}"
        env:
          TOKEN: ${{ steps.get_token.outputs.token }}

      - name: Checkout Packaging Repo
        uses: actions/checkout@v4
        with:
          repository: canonical/landscape-packaging
          token: ${{ steps.get_token.outputs.token }}
          # This tells the action to handle the submodules for you
          submodules: "recursive"
          # Specify where you want it to land
          path: landscape-packaging

      # - name: Verify Token Permissions
