name: Full TICS report

on: workflow_dispatch

jobs:
  unit-tests:
    runs-on: [self-hosted, Linux, large]
    permissions:
      contents: read
      pull-requests: write
    environment: dev
    env:
      VITE_API_URL: ${{ vars.API_URL }}
      VITE_API_URL_OLD: ${{ vars.API_URL_OLD }}
      VITE_API_URL_DEB_ARCHIVE: /v1beta1/
      VITE_APP_TITLE: Landscape
      VITE_ROOT_PATH: /new_dashboard/
      VITE_REPORT_VIEW_ENABLED: false
      VITE_DETAILED_UPGRADES_VIEW_ENABLED: false
      VITE_APP_VERSION: "26.04.0.12"
      VITE_APP_COMMIT: ${{ github.sha }}
      VITE_SELF_HOSTED_ENV: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm exec vitest run --coverage
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-report
          path: ${{ github.workspace }}/reports
          retention-days: 30

  tics-report:
    runs-on: [self-hosted, linux, amd64, tiobe, jammy]
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: vitest-report
          path: ${{ github.workspace }}/reports

      - name: TICS report
        uses: tiobe/tics-github-action@v3
        with:
          mode: qserver
          project: landscape-ui
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true
