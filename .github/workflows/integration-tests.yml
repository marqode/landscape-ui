name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      server_ref:
        description: "landscape-server ref (reserved for future use — submodule is currently pinned by landscape-packaging)"
        default: "main"
        required: false
      go_ref:
        description: "landscape-go ref (reserved for future use — submodule is currently pinned by landscape-packaging)"
        default: "main"
        required: false

jobs:
  integration-tests:
    name: integration-tests
    # Preferred runner when self-hosted pool is available (faster due to Docker layer cache):
    # runs-on: [self-hosted, Linux, large]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      LANDSCAPE_DEPLOYMENT_MODE: standalone
      CI_ADMIN_EMAIL: ci-admin@example.com

    steps:
      - name: Checkout landscape-ui
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout landscape-packaging (with submodules)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: canonical/landscape-packaging
          token: ${{ secrets.LANDSCAPE_PACKAGER_TOKEN }}
          submodules: recursive
          path: .landscape-packaging

      - name: Generate ephemeral CI password
        run: |
          _pass=$(openssl rand -hex 16)
          echo "::add-mask::$_pass"
          echo "CI_ADMIN_PASSWORD=$_pass" >> "$GITHUB_ENV"

      - name: Create landscape-server bind-mount directories
        working-directory: .landscape-packaging/docker/ui-dev
        run: mkdir -p ../../landscape-server/.venv ../../landscape-server/build ../../landscape-server/var/log

      - name: Configure git credentials for private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.LANDSCAPE_PACKAGER_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Vendor landscape-go dependencies
        working-directory: .landscape-packaging/landscape-go
        run: GOPRIVATE="github.com/canonical/*" go mod vendor

      - name: Install Docker Compose v2.36+ (initial_sync support)
        run: |
          COMPOSE_VERSION="v2.36.0"
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version

      - name: Patch compose.yaml for CI compatibility
        # initial_sync is a Docker Desktop-only compose extension not yet in the
        # open-source schema. We don't start the landscape-ui service so removing
        # the line has no effect on the test stack.
        run: sed -i '/initial_sync:/d' .landscape-packaging/docker/ui-dev/compose.yaml

      - name: Start backend stack
        working-directory: .landscape-packaging/docker/ui-dev
        run: |
          _uid=$(id -u)
          _gid=$(id -g)
          _uname=$(whoami)
          env UID="$_uid" GID="$_gid" UNAME="$_uname" \
            docker compose \
              -p "ls-integration-${{ github.run_id }}" \
              up -d \
              postgresql rabbitmq rsyslog builder \
              package-search api appserver fake-openid

      - name: Wait for API and appserver to be ready
        run: |
          timeout 180 bash -c \
            'until curl -sf --max-time 5 http://localhost:9091/api/v2/ && \
                   curl -sf --max-time 5 http://localhost:8080/; \
             do sleep 5; done'

      - name: Seed admin account
        working-directory: .landscape-packaging/docker/ui-dev
        run: |
          docker compose -p "ls-integration-${{ github.run_id }}" \
            exec -T api \
            uv run python bootstrap-account \
              --admin_email "$CI_ADMIN_EMAIL" \
              --admin_name "CI Test Admin" \
              --admin_password "$CI_ADMIN_PASSWORD" \
              --root_url "http://localhost:5173/"

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run integration tests
        run: pnpm exec playwright test --config playwright.integration.config.ts
        env:
          CI_ADMIN_EMAIL: ${{ env.CI_ADMIN_EMAIL }}
          CI_ADMIN_PASSWORD: ${{ env.CI_ADMIN_PASSWORD }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-integration-report
          path: playwright-integration-report
          retention-days: 14

      - name: Teardown backend stack
        if: always()
        working-directory: .landscape-packaging/docker/ui-dev
        run: |
          docker compose -p "ls-integration-${{ github.run_id }}" \
            down --remove-orphans --volumes
